
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/style.css"> 
    <link rel="shortcut icon" href="./assets/brain.png" type="image/x-icon">

    <title>Relatórios ABA - Cris</title>
</head>

<body>

    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="d-flex justify-content-end mb-3">
            <button class="btn btn-outline-secondary btn-sm" onclick="toggleDarkMode()">
                🌙 Modo escuro
            </button>
        </div>
        <div class="clinic-card w-100">

            <!-- Objetivo -->
            <div class="form-floating mb-3">
                <textarea class="form-control" id="objSession"></textarea>
                <label>Objetivo da sessão</label>
            </div>

            <!-- Materiais -->
            <div class="form-floating mb-3">
                <textarea class="form-control" id="material"></textarea>
                <label>Materiais e recursos utilizados</label>
            </div>

            <!-- Estado inicial -->
            <h3 class="h6">Estado geral na chegada</h3>
            <div class="btn-group mb-3 w-100">
                <input type="radio" class="btn-check" name="estado" id="bom" value="Em bom estado geral (BEG)">
                <label class="btn btn-outline-primary" for="bom">Bom estado geral</label>

                <input type="radio" class="btn-check" name="estado" id="frustrado" value="Frustrado">
                <label class="btn btn-outline-primary" for="frustrado">Frustrado</label>
            </div>

            <!-- Sessão -->
            <div class="form-check mb-3" id="divSessao">
                <input type="checkbox" id="sessao" class="form-check-input">
                <label for="sessao">Sessão sem intercorrências</label>
            </div>

            <!-- Evolução -->
            <div class="form-floating mb-3">
                <input id="evolucao" class="form-control" type="text" required>
                <label>Evolução clínica observada</label>
            </div>

            <!-- Necessidades -->
            <h3 class="h6">Necessidades durante a sessão</h3>
            <div class="btn-group mb-3 w-100">
                <input type="checkbox" class="btn-check" id="agua" value="Água">
                <label class="btn btn-outline-secondary" for="agua">Água</label>

                <input type="checkbox" class="btn-check" id="lanche" value="Lanche">
                <label class="btn btn-outline-secondary" for="lanche">Lanche</label>

                <input type="checkbox" class="btn-check" id="banheiro" value="Banheiro">
                <label class="btn btn-outline-secondary" for="banheiro">Banheiro</label>

                <input type="checkbox" class="btn-check" id="fralda" value="Fralda">
                <label class="btn btn-outline-secondary" for="fralda">Fralda</label>
            </div>

            <!-- Supervisor -->
            <div class="form-floating mb-3">
                <select class="form-select" id="profissional">
                    <option>Pedro Henrique Andrade de Sousa</option>
                    <option>Samara Teles de Nogueira</option>
                    <option>Amanda De Carli Farias Cruz</option>
                </select>
                <label>Nome do supervisor</label>
            </div>

            <!-- Botões -->
            <div class="text-center mt-3">
                <button class="btn btn-primary px-4">Copiar relatório</button>
                <button class="btn btn-outline-secondary px-4 ms-2" onclick="location.reload()">Limpar</button>
            </div>

            <!-- Footer -->
            <footer class="text-center mt-4">
                &copy; Cristiano Crispim Costa Filho
            </footer>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script> 
    <script src="./assets/scripts.js"></script>
</body>
</html>
